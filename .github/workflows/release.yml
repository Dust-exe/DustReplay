name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application icon
        working-directory: dustreplay
        shell: pwsh
        run: |
          if (Test-Path _mkicon.py) { python _mkicon.py }

      - name: Bundle ffmpeg for offline installer
        shell: pwsh
        run: pwsh -File installer/bundle-ffmpeg.ps1 -RepoRoot "${{ github.workspace }}"

      - name: PyInstaller (DustReplay.exe)
        working-directory: dustreplay
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../dist, ../build/pyinstaller_work | Out-Null
          $base = @(
            "-m", "PyInstaller",
            "--onefile", "--noconsole",
            "--name", "DustReplay",
            "--distpath", "../dist",
            "--workpath", "../build/pyinstaller_work",
            "--specpath", ".",
            "--hidden-import", "pystray._win32",
            "--hidden-import", "PIL._tkinter_finder",
            "--hidden-import", "monitors",
            "--hidden-import", "audio_devices",
            "--hidden-import", "overlay",
            "--hidden-import", "encoding",
            "--hidden-import", "version",
            "--hidden-import", "stats_window",
            "--hidden-import", "i18n",
            "--hidden-import", "theme",
            "--hidden-import", "thumb_cache",
            "--hidden-import", "main_window",
            "--hidden-import", "branding_paths",
            "--add-data", "branding;branding"
          )
          if (Test-Path "icon.ico") {
            python @base --icon=icon.ico main.py
          } else {
            python @base main.py
          }
          if (-not (Test-Path ../dist/DustReplay.exe)) { throw "PyInstaller did not produce dist/DustReplay.exe" }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Inno Setup (DustReplay-Setup.exe)
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after choco install innosetup" }
          $iss = Join-Path $env:GITHUB_WORKSPACE "installer\DustReplay.iss"
          & $iscc $iss
          $setup = Join-Path $env:GITHUB_WORKSPACE "dist\DustReplay-Setup.exe"
          if (-not (Test-Path $setup)) { throw "Inno Setup did not produce: $setup" }

      - name: Verify build outputs
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "dist") | Format-Table Name, Length
          $exe = Join-Path $env:GITHUB_WORKSPACE "dist\DustReplay.exe"
          $setup = Join-Path $env:GITHUB_WORKSPACE "dist\DustReplay-Setup.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing PyInstaller output: $exe" }
          if (-not (Test-Path -LiteralPath $setup)) { throw "Missing installer: $setup" }

      - name: Publish GitHub Release (single installer exe)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-Location "${{ github.workspace }}"
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $setup = "dist/DustReplay-Setup.exe"
          if (-not (Test-Path -LiteralPath $setup)) { throw "Missing file for release: $setup" }

          gh release view $tag --repo $repo *> $null
          $releaseExists = $?
          if ($releaseExists) {
            Write-Host "Release exists; replacing installer asset only..."
            gh release upload $tag $setup --repo $repo --clobber
            if ($LASTEXITCODE -ne 0) { throw "gh release upload failed (exit $LASTEXITCODE)" }
          } else {
            Write-Host "Creating GitHub Release for tag $tag (installer only)..."
            gh release create $tag $setup `
              --repo $repo `
              --title "DustReplay $tag" `
              --verify-tag `
              --generate-notes
            if ($LASTEXITCODE -ne 0) { throw "gh release create failed (exit $LASTEXITCODE)" }
          }
