name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application icon
        working-directory: dustreplay
        shell: pwsh
        run: |
          if (Test-Path _mkicon.py) { python _mkicon.py }

      - name: Bundle ffmpeg for offline installer
        shell: pwsh
        run: pwsh -File installer/bundle-ffmpeg.ps1

      - name: PyInstaller (DustReplay.exe)
        working-directory: dustreplay
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../dist, ../build/pyinstaller_work, ../build | Out-Null
          $base = @(
            "-m", "PyInstaller",
            "--onefile", "--noconsole",
            "--name", "DustReplay",
            "--distpath", "../dist",
            "--workpath", "../build/pyinstaller_work",
            "--specpath", "../build",
            "--hidden-import", "pystray._win32",
            "--hidden-import", "PIL._tkinter_finder",
            "--hidden-import", "monitors",
            "--hidden-import", "audio_devices",
            "--hidden-import", "overlay",
            "--hidden-import", "encoding",
            "--hidden-import", "version",
            "--hidden-import", "stats_window",
            "--hidden-import", "i18n",
            "--hidden-import", "theme"
          )
          if (Test-Path icon.ico) {
            python @base --icon=icon.ico main.py
          } else {
            python @base main.py
          }
          if (-not (Test-Path ../dist/DustReplay.exe)) { throw "PyInstaller did not produce dist/DustReplay.exe" }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Inno Setup (DustReplay-Setup.exe)
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after choco install innosetup" }
          $iss = Join-Path $env:GITHUB_WORKSPACE "installer\DustReplay.iss"
          & $iscc $iss
          $setup = Join-Path $env:GITHUB_WORKSPACE "dist\DustReplay-Setup.exe"
          if (-not (Test-Path $setup)) { throw "Inno Setup did not produce: $setup" }

      - name: Verify release binaries exist
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "dist") | Format-Table Name, Length
          $need = @(
            "dist\DustReplay.exe",
            "dist\DustReplay-Setup.exe",
            "LICENSE",
            "LEGAL.md"
          )
          foreach ($rel in $need) {
            $p = Join-Path $env:GITHUB_WORKSPACE $rel
            if (-not (Test-Path -LiteralPath $p)) { throw "Missing release artifact: $p" }
          }

      - name: Publish GitHub Release (gh CLI)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-Location "${{ github.workspace }}"
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $assets = @(
            "dist/DustReplay.exe",
            "dist/DustReplay-Setup.exe",
            "LICENSE",
            "LEGAL.md"
          )
          foreach ($p in $assets) {
            if (-not (Test-Path -LiteralPath $p)) { throw "Missing file for release: $p" }
          }

          gh release view $tag --repo $repo 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release exists; uploading / replacing assets..."
            $up = @("release", "upload", $tag) + $assets + @("--repo", $repo, "--clobber")
            & gh @up
            if ($LASTEXITCODE -ne 0) { throw "gh release upload failed (exit $LASTEXITCODE)" }
          } else {
            Write-Host "Creating new GitHub Release for tag $tag ..."
            $cr = @(
              "release", "create", $tag
            ) + $assets + @(
              "--repo", $repo,
              "--title", "DustReplay $tag",
              "--verify-tag",
              "--generate-notes"
            )
            & gh @cr
            if ($LASTEXITCODE -ne 0) { throw "gh release create failed (exit $LASTEXITCODE)" }
          }
